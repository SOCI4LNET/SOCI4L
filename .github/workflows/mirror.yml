name: Sync to Personal Repo

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Push to Personal Repo
        run: |
          git push -f https://xBrokkr:${{ secrets.TARGET_REPO_PAT }}@github.com/xBrokkr/SOCI4L main
