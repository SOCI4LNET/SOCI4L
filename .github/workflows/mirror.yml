name: Sync to Personal Repo

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Mirror to Personal Repo
        env:
          PAT: ${{ secrets.TARGET_REPO_PAT }}
        run: |
          git push -f https://x-access-token:$PAT@github.com/xBrokkr/SOCI4L.git main
