name: Sync to Personal Repo

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Mirror to Personal Repo
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.TARGET_REPO_PAT }}
          repository: xBrokkr/SOCI4L
          force: true
          branch: main
